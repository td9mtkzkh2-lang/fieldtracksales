<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#2563EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FieldTrack">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23dc2626'/><text y='130' x='90' text-anchor='middle' font-size='100'>⚡</text></svg>">
<title>FieldTrack — Dashboard Manager</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0F172A;color:#e5e7eb;font-family:'Sora',sans-serif;min-height:100vh}
  input,select,textarea{font-family:'Sora',sans-serif}
  button{font-family:'Sora',sans-serif;cursor:pointer}
  .hidden{display:none!important}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
  .fade{animation:fadeIn .3s ease}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0F172A}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══════════════════════════════════════════════════════════ -->
<div id="loginScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:36px">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#2563EB,#1D4ED8);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px">⚡</div>
      <div style="font-weight:800;font-size:26px">FieldTrack</div>
      <div style="font-size:11px;color:#2563EB;letter-spacing:3px;font-family:'Space Mono',monospace;margin-top:4px">MASTER DASHBOARD</div>
    </div>
    <div style="background:#1E293B;border:1px solid #ffffff0f;border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:16px">
      <div>
        <label style="font-size:11px;color:#9ca3af;letter-spacing:1px;font-weight:700">EMAIL MANAGER</label>
        <input id="loginEmail" type="email" placeholder="tua@email.it" style="display:block;width:100%;margin-top:6px;background:#0F172A;border:1px solid #ffffff15;border-radius:9px;padding:11px 14px;color:#e5e7eb;font-size:14px">
      </div>
      <div>
        <label style="font-size:11px;color:#9ca3af;letter-spacing:1px;font-weight:700">PASSWORD</label>
        <input id="loginPwd" type="password" placeholder="••••••••" style="display:block;width:100%;margin-top:6px;background:#0F172A;border:1px solid #ffffff15;border-radius:9px;padding:11px 14px;color:#e5e7eb;font-size:14px">
      </div>
      <div id="loginError" style="color:#ef4444;font-size:12px;text-align:center;display:none"></div>
      <button onclick="doLogin()" style="background:linear-gradient(135deg,#2563EB,#1D4ED8);border:none;color:#fff;border-radius:12px;padding:13px;font-weight:800;font-size:15px">Accedi →</button>
      <button onclick="doRegister()" style="background:transparent;border:1px solid #ffffff20;color:#9ca3af;border-radius:12px;padding:11px;font-size:13px">Prima volta? Crea account manager</button>
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══════════════════════════════════════════════════════════════ -->
<div id="mainApp" class="hidden">

  <!-- header -->
  <div style="background:linear-gradient(135deg,#1E293B,#0F172A);border-bottom:1px solid #ffffff12;padding:0 24px;position:sticky;top:0;z-index:100">
    <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#2563EB,#1D4ED8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px">⚡</div>
        <div>
          <div style="font-weight:800;font-size:16px;letter-spacing:-.5px">FieldTrack</div>
          <div style="font-size:10px;color:#2563EB;letter-spacing:2px;font-family:'Space Mono',monospace">MASTER DASHBOARD</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="userEmail" style="font-size:12px;color:#6b7280"></span>
        <button onclick="doLogout()" style="background:#ffffff10;border:1px solid #ffffff15;color:#9ca3af;border-radius:8px;padding:6px 12px;font-size:12px">Esci</button>
      </div>
    </div>
  </div>

  <!-- nav tabs -->
  <div style="background:#0F172A;border-bottom:1px solid #ffffff0a;padding:0 24px">
    <div style="max-width:1100px;margin:0 auto;display:flex;gap:4px;padding:8px 0">
      <button class="tab-btn active" onclick="showTab('visits')" data-tab="visits" style="background:#2563EB20;border:1px solid #2563EB55;color:#60A5FA;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600">📋 Visite</button>
      <button class="tab-btn" onclick="showTab('agents')" data-tab="agents" style="background:transparent;border:1px solid transparent;color:#9ca3af;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600">👥 Agenti</button>
      <button class="tab-btn" onclick="showTab('invite')" data-tab="invite" style="background:transparent;border:1px solid transparent;color:#9ca3af;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600">✉️ Invita</button>
      <button class="tab-btn" onclick="showTab('stats')" data-tab="stats" style="background:transparent;border:1px solid transparent;color:#9ca3af;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600">📊 Statistiche</button>
    </div>
  </div>

  <div style="max-width:1100px;margin:0 auto;padding:28px 24px">

    <!-- ── VISITE ── -->
    <div id="tab-visits" class="tab-content fade">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
        <h2 style="font-size:22px;font-weight:800">Registro Visite</h2>
        <button onclick="exportCSV()" style="background:linear-gradient(135deg,#2563EB,#1D4ED8);border:none;color:#fff;border-radius:10px;padding:9px 20px;font-weight:700;font-size:13px">⬇ Esporta CSV</button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
        <input id="filterQ" oninput="renderVisits()" placeholder="🔍  Cerca contatto, indirizzo, esito…" style="flex:2;min-width:200px;background:#1E293B;border:1px solid #ffffff15;border-radius:9px;padding:8px 14px;color:#e5e7eb;font-size:13px">
        <select id="filterAgent" onchange="renderVisits()" style="flex:1;min-width:150px;background:#1E293B;border:1px solid #ffffff15;border-radius:9px;padding:8px 14px;color:#e5e7eb;font-size:13px">
          <option value="">Tutti gli agenti</option>
        </select>
        <select id="filterResult" onchange="renderVisits()" style="flex:1;min-width:140px;background:#1E293B;border:1px solid #ffffff15;border-radius:9px;padding:8px 14px;color:#e5e7eb;font-size:13px">
          <option value="">Tutti i risultati</option>
          <option value="positive">✓ Positivo</option>
          <option value="followup">↻ Follow-up</option>
          <option value="negative">✗ Negativo</option>
        </select>
      </div>
      <div id="visitsCount" style="font-size:12px;color:#6b7280;margin-bottom:12px"></div>
      <div id="visitsTable" style="background:#1E293B;border-radius:16px;border:1px solid #ffffff0f;overflow:hidden"></div>
    </div>

    <!-- ── AGENTI ── -->
    <div id="tab-agents" class="tab-content hidden">
      <h2 style="font-size:22px;font-weight:800;margin-bottom:24px">Gestione Agenti</h2>
      <div id="agentsList"></div>
    </div>

    <!-- ── INVITA ── -->
    <div id="tab-invite" class="tab-content hidden" style="max-width:520px">
      <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Invita un Agente</h2>
      <p style="color:#6b7280;margin-bottom:28px;font-size:14px">L'agente riceverà un codice per accedere all'app dal telefono.</p>
      <div style="background:#1E293B;border:1px solid #ffffff0f;border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:16px">
        <div>
          <label style="font-size:11px;color:#9ca3af;letter-spacing:1px;font-weight:700">NOME AGENTE</label>
          <input id="inviteName" placeholder="Mario Bianchi" style="display:block;width:100%;margin-top:6px;background:#0F172A;border:1px solid #ffffff15;border-radius:9px;padding:10px 14px;color:#e5e7eb;font-size:14px">
        </div>
        <div>
          <label style="font-size:11px;color:#9ca3af;letter-spacing:1px;font-weight:700">EMAIL AGENTE</label>
          <input id="inviteEmail" type="email" placeholder="agente@esempio.it" style="display:block;width:100%;margin-top:6px;background:#0F172A;border:1px solid #ffffff15;border-radius:9px;padding:10px 14px;color:#e5e7eb;font-size:14px">
        </div>
        <button onclick="sendInvite()" style="background:linear-gradient(135deg,#2563EB,#1D4ED8);border:none;color:#fff;border-radius:10px;padding:13px;font-weight:800;font-size:15px">✉️ Crea Invito</button>
      </div>
      <div id="inviteResult" style="margin-top:20px"></div>
    </div>

    <!-- ── STATISTICHE ── -->
    <div id="tab-stats" class="tab-content hidden">
      <h2 style="font-size:22px;font-weight:800;margin-bottom:24px">Statistiche</h2>
      <div id="statsCards" style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px"></div>

      <h3 style="font-size:16px;font-weight:700;color:#9ca3af;margin-bottom:16px">Visite per giorno (ultimi 7 giorni)</h3>
      <div style="background:#1a1a2e;border-radius:16px;border:1px solid #ffffff0f;padding:20px;margin-bottom:32px">
        <canvas id="visitsChart" height="120"></canvas>
      </div>

      <h3 style="font-size:16px;font-weight:700;color:#9ca3af;margin-bottom:16px">Performance per Agente</h3>
      <div id="statsBars" style="margin-bottom:32px"></div>

      <h3 style="font-size:16px;font-weight:700;color:#9ca3af;margin-bottom:16px">Mappa Visite (con GPS)</h3>
      <div id="visitsMap" style="height:450px;border-radius:16px;overflow:hidden;border:1px solid #ffffff0f"></div>
    </div>

  </div>
</div>

<!-- ── VISIT DETAIL MODAL ── -->
<div id="modal" onclick="closeModal()" style="display:none;position:fixed;inset:0;background:#00000088;z-index:999;align-items:center;justify-content:center;padding:20px">
  <div onclick="event.stopPropagation()" style="background:#1E293B;border:1px solid #ffffff15;border-radius:20px;padding:28px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto">
    <div id="modalContent"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, remove }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZ9UewYe58q3PKlLvbrpq8dkehrvHiXUY",
  authDomain: "fieldtracksales.firebaseapp.com",
  databaseURL: "https://fieldtracksales-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fieldtracksales",
  storageBucket: "fieldtracksales.firebasestorage.app",
  messagingSenderId: "856016235189",
  appId: "1:856016235189:web:f39c8be1c7660283b8ecfc"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

// ── global state ──────────────────────────────────────────────────────────
let allVisits = [];
let allAgents = [];

// ── auth ──────────────────────────────────────────────────────────────────
window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  const err   = document.getElementById('loginError');
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch(e) {
    err.textContent = 'Email o password errati.';
    err.style.display = 'block';
  }
};

window.doRegister = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  const err   = document.getElementById('loginError');
  if (!email || pwd.length < 6) { err.textContent='Inserisci email e password (min 6 caratteri)'; err.style.display='block'; return; }
  try {
    await createUserWithEmailAndPassword(auth, email, pwd);
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
};

window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userEmail').textContent = user.email;
    loadData(user.uid);
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').classList.add('hidden');
  }
});

// ── data ──────────────────────────────────────────────────────────────────
function loadData(uid) {
  // visits — listen to all agents' visits under /visits/
  let firstLoad = true;
  onValue(ref(db, 'visits'), snap => {
    const newVisits = [];
    snap.forEach(child => { newVisits.push({...child.val(), _key: child.key}); });
    newVisits.sort((a,b) => b.timestamp - a.timestamp);
    if (!firstLoad && newVisits.length > allVisits.length) {
      const newest = newVisits[0];
      showNotification(`📍 Nuova visita da ${newest.agentName||'Agente'}`, `${newest.contact||'—'} — ${newest.result==='positive'?'✓ Positivo':newest.result==='negative'?'✗ Negativo':'↻ Follow-up'}`);
    }
    firstLoad = false;
    allVisits = newVisits;
    renderVisits();
    renderStats();
  });

  // agents
  onValue(ref(db, 'agents'), snap => {
    allAgents = [];
    snap.forEach(child => { allAgents.push({...child.val(), _key: child.key}); });
    renderAgents();
    renderStats();
    // populate agent filter
    const sel = document.getElementById('filterAgent');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Tutti gli agenti</option>';
    allAgents.forEach(a => {
      const o = document.createElement('option');
      o.value = a.id; o.textContent = a.name;
      sel.appendChild(o);
    });
    sel.value = cur;
  });
}

// ── render visits ─────────────────────────────────────────────────────────
window.renderVisits = () => {
  const q      = document.getElementById('filterQ').value.toLowerCase();
  const agent  = document.getElementById('filterAgent').value;
  const result = document.getElementById('filterResult').value;

  const filtered = allVisits.filter(v => {
    if (agent  && v.agentId !== agent) return false;
    if (result && v.result  !== result) return false;
    if (q && !`${v.contact||''} ${v.address||''} ${v.email||''} ${v.outcome||''}`.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('visitsCount').textContent = `${filtered.length} visite trovate`;
  window._filteredVisits = filtered;

  const wrap = document.getElementById('visitsTable');
  if (!filtered.length) {
    wrap.innerHTML = '<div style="padding:40px;text-align:center;color:#6b7280">Nessuna visita trovata</div>';
    return;
  }

  const header = `<div style="display:grid;grid-template-columns:100px 130px 160px 1fr 110px 36px;gap:0;background:#0F172A;padding:10px 16px;font-size:11px;color:#6b7280;letter-spacing:1px;font-weight:700;text-transform:uppercase">
    <span>Data</span><span>Agente</span><span>Contatto</span><span>Esito</span><span>Risultato</span><span></span></div>`;

  const rows = filtered.map((v,i) => `
    <div onclick="openModal('${v._key}')" style="display:grid;grid-template-columns:100px 130px 160px 1fr 110px 36px;gap:0;padding:12px 16px;border-top:${i>0?'1px solid #ffffff08':'none'};align-items:start;cursor:pointer;transition:background .15s"
      onmouseover="this.style.background='#ffffff05'" onmouseout="this.style.background='transparent'">
      <span style="font-size:10px;color:#6b7280;font-family:'Space Mono',monospace;line-height:1.4">${fmtDate(v.timestamp)}</span>
      <span style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px">${esc(v.agentName||'')}</span>
      <div style="overflow:hidden;padding-right:4px"><div style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.contact||'—')}</div><div style="font-size:10px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.address||'')}</div></div>
      <span style="font-size:12px;color:#d1d5db;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;padding-right:4px">${esc((v.outcome||'').slice(0,80))}</span>
      ${badge(v.result)}
      <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
        <span style="color:#2563EB;font-size:18px;cursor:pointer" title="Dettaglio">›</span>
        <span onclick="event.stopPropagation();deleteVisit('${v._key}')" style="color:#ef4444;font-size:12px;cursor:pointer" title="Elimina">✕</span>
      </div>
    </div>`).join('');

  wrap.innerHTML = header + rows;
};

// ── modal ─────────────────────────────────────────────────────────────────
window.openModal = (key) => {
  const v = allVisits.find(x => x._key === key);
  if (!v) return;
  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div><div style="font-weight:800;font-size:20px">${esc(v.contact||'—')}</div>
      <div style="color:#6b7280;font-size:13px;margin-top:2px">${fmtDate(v.timestamp)}</div></div>
      <button onclick="closeModal()" style="background:#ffffff10;border:none;color:#9ca3af;border-radius:8px;width:32px;height:32px;font-size:18px">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${field('👤 Agente', v.agentName)}
      ${field('📍 Indirizzo', v.address)}
      ${field('📧 Email', v.email||'—')}
      ${field('📞 Telefono', v.phone||'—')}
      ${field('🛰 GPS', v.gps||'—')}
      ${field('🎤 Esito visita', v.outcome)}
      <div style="text-align:center;margin-top:4px">${badge(v.result)}</div>
    </div>`;
  const m = document.getElementById('modal');
  m.style.display = 'flex';
};
window.closeModal = () => { document.getElementById('modal').style.display = 'none'; };

// ── agents ────────────────────────────────────────────────────────────────
window.renderAgents = () => {
  const wrap = document.getElementById('agentsList');
  if (!allAgents.length) { wrap.innerHTML = '<div style="color:#6b7280">Nessun agente ancora.</div>'; return; }
  wrap.innerHTML = allAgents.map(a => {
    const av  = allVisits.filter(v => v.agentId === a.id);
    const pos = av.filter(v => v.result === 'positive').length;
    return `<div style="background:#1E293B;border:1px solid #ffffff0f;border-radius:14px;padding:16px 20px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#1D4ED8);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0">${a.name.charAt(0)}</div>
        <div style="flex:1;min-width:120px"><div style="font-weight:700;font-size:15px">${esc(a.name)}</div><div style="font-size:12px;color:#6b7280">${esc(a.email||'')}</div></div>
        <div style="text-align:center"><div style="font-weight:800;font-size:20px;color:#2563EB;font-family:'Space Mono',monospace">${av.length}</div><div style="font-size:10px;color:#6b7280;letter-spacing:.5px">VISITE</div></div>
        <div style="text-align:center"><div style="font-weight:800;font-size:20px;color:#22c55e;font-family:'Space Mono',monospace">${pos}</div><div style="font-size:10px;color:#6b7280;letter-spacing:.5px">POSITIVI</div></div>
        <div style="background:${a.status==='active'?'#22c55e20':'#f59e0b20'};border:1px solid ${a.status==='active'?'#22c55e55':'#f59e0b55'};color:${a.status==='active'?'#22c55e':'#f59e0b'};border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700">${a.status==='active'?'● Attivo':'○ In attesa'}</div>
      </div>
      <!-- codice + azioni -->
      <div style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap">
        <div style="font-size:11px;color:#4b5563;font-family:'Space Mono',monospace;background:#0F172A;border-radius:6px;padding:5px 10px;flex:1;min-width:120px">🔑 ${a.inviteCode||'—'}</div>
        <button onclick="resendInvite('${a._key}')" style="background:#2563EB20;border:1px solid #2563EB55;color:#60A5FA;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">📤 Rimanda</button>
        <button onclick="newCode('${a._key}')" style="background:#f59e0b20;border:1px solid #f59e0b55;color:#f59e0b;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">🔄 Nuovo codice</button>
        <button onclick="deleteAgent('${a._key}','${esc(a.name)}')" style="background:#ef444420;border:1px solid #ef444455;color:#ef4444;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">🗑 Elimina</button>
      </div>
    </div>`;
  }).join('');
};

window.deleteAgent = async (key, name) => {
  if (!confirm(`Eliminare ${name}? Le sue visite rimarranno nello storico.`)) return;
  await remove(ref(db, `agents/${key}`));
};

window.newCode = async (key) => {
  const code = 'FT-' + Math.random().toString(36).slice(2,8).toUpperCase();
  const agent = allAgents.find(a => a._key === key);
  if (!agent) return;
  await set(ref(db, `agents/${key}/inviteCode`), code);
  await set(ref(db, `agents/${key}/status`), 'pending');
  alert(`Nuovo codice generato: ${code}\nOra clicca "Rimanda" per inviarlo all'agente.`);
};

window.resendInvite = (key) => {
  const agent = allAgents.find(a => a._key === key);
  if (!agent) return;
  const agentUrl = `${location.origin}/agent.html`;
  const txt = `Ciao ${agent.name}! Ecco il tuo accesso a FieldTrack.\n\n1. Apri questo link: ${agentUrl}\n2. Inserisci il codice: ${agent.inviteCode}\n\nBuon lavoro! 🚀`;
  navigator.clipboard.writeText(txt).then(() => alert('✓ Messaggio copiato! Incollalo su WhatsApp o email.'));
};

// ── invite ────────────────────────────────────────────────────────────────
window.sendInvite = async () => {
  const name  = document.getElementById('inviteName').value.trim();
  const email = document.getElementById('inviteEmail').value.trim();
  if (!name || !email) { alert('Inserisci nome e email'); return; }
  const code = 'FT-' + Math.random().toString(36).slice(2,8).toUpperCase();
  const id   = 'ag-' + Date.now();
  await set(ref(db, `agents/${id}`), { id, name, email, status:'pending', inviteCode: code, createdAt: Date.now() });
  document.getElementById('inviteName').value = '';
  document.getElementById('inviteEmail').value = '';

  const agentUrl = `${location.origin}/agent.html`;
  document.getElementById('inviteResult').innerHTML = `
    <div style="background:#22c55e12;border:1px solid #22c55e44;border-radius:14px;padding:20px">
      <div style="font-weight:800;color:#22c55e;margin-bottom:8px">✓ Invito creato per ${esc(name)}</div>
      <div style="font-size:13px;color:#9ca3af;margin-bottom:4px">Invia questo codice a <strong style="color:#e5e7eb">${esc(email)}</strong>:</div>
      <div style="font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:#60A5FA;background:#0F172A;border-radius:8px;padding:10px 16px;letter-spacing:2px;margin:10px 0">${code}</div>
      <div style="font-size:12px;color:#6b7280">Link app agente da mandare:</div>
      <div style="font-size:12px;color:#2563EB;word-break:break-all;margin-top:4px">${agentUrl}</div>
      <button onclick="copyInvite('${code}','${agentUrl}','${esc(name)}')" style="margin-top:12px;background:#2563EB20;border:1px solid #2563EB55;color:#60A5FA;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:700">📋 Copia messaggio</button>
    </div>`;
};

window.copyInvite = (code, url, name) => {
  const txt = `Ciao ${name||''}! Sei stato invitato su FieldTrack.\n\n1. Apri questo link dal tuo telefono: ${url}\n2. Inserisci il codice: ${code}\n\nBuon lavoro! 🚀`;
  navigator.clipboard.writeText(txt).then(() => alert('✓ Messaggio copiato! Incollalo su WhatsApp o email.'));
};

// ── stats ─────────────────────────────────────────────────────────────────
let chartInstance = null;
let mapInstance   = null;

window.renderStats = () => {
  const pos  = allVisits.filter(v=>v.result==='positive').length;
  const fol  = allVisits.filter(v=>v.result==='followup').length;
  const acts = allAgents.filter(a=>a.status==='active').length;

  document.getElementById('statsCards').innerHTML = [
    ['📋','VISITE TOTALI', allVisits.length, '#2563EB'],
    ['✅','POSITIVE',      pos,              '#22c55e'],
    ['↻', 'FOLLOW-UP',    fol,              '#f59e0b'],
    ['👥','AGENTI ATTIVI', acts,             '#1D4ED8'],
  ].map(([ic,lab,val,col])=>`
    <div style="background:#1E293B;border:1px solid ${col}33;border-radius:16px;padding:20px 24px;flex:1;min-width:140px">
      <div style="font-size:28px;margin-bottom:4px">${ic}</div>
      <div style="font-size:32px;font-weight:800;color:${col};font-family:'Space Mono',monospace">${val}</div>
      <div style="font-size:12px;color:#9ca3af;margin-top:2px;letter-spacing:.5px">${lab}</div>
    </div>`).join('');

  document.getElementById('statsBars').innerHTML = allAgents.filter(a=>a.status==='active').map(a=>{
    const av  = allVisits.filter(v=>v.agentId===a.id);
    const pos = av.filter(v=>v.result==='positive').length;
    const rate = av.length ? Math.round(pos/av.length*100) : 0;
    return `<div style="background:#1E293B;border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:16px;margin-bottom:10px">
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#1D4ED8);display:flex;align-items:center;justify-content:center;font-weight:800">${a.name.charAt(0)}</div>
      <div style="flex:1;min-width:100px"><div style="font-weight:700">${esc(a.name)}</div><div style="font-size:11px;color:#6b7280">${av.length} visite · ${pos} positivi</div></div>
      <div style="flex:2;display:flex;align-items:center;gap:10px">
        <div style="flex:1;height:8px;background:#0F172A;border-radius:4px;overflow:hidden">
          <div style="width:${rate}%;height:100%;background:linear-gradient(90deg,#2563EB,#22c55e);border-radius:4px"></div>
        </div>
        <div style="font-weight:800;font-family:'Space Mono',monospace;color:#22c55e;min-width:40px">${rate}%</div>
      </div>
    </div>`;
  }).join('');

  // ── Chart: visite per giorno ultimi 7 giorni ──
  const days = [];
  const counts = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const label = d.toLocaleDateString('it-IT', {weekday:'short', day:'numeric'});
    days.push(label);
    const dateStr = d.toDateString();
    counts.push(allVisits.filter(v => new Date(v.timestamp).toDateString() === dateStr).length);
  }
  const ctx = document.getElementById('visitsChart');
  if (ctx) {
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: days,
        datasets: [{
          label: 'Visite',
          data: counts,
          backgroundColor: 'rgba(220,38,38,0.7)',
          borderColor: '#2563EB',
          borderWidth: 2,
          borderRadius: 8,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#9ca3af' }, grid: { color: '#ffffff08' } },
          y: { ticks: { color: '#9ca3af', stepSize: 1 }, grid: { color: '#ffffff08' }, beginAtZero: true }
        }
      }
    });
  }

  // ── Map: pin visite con GPS ──
  const mapEl = document.getElementById('visitsMap');
  if (mapEl) {
    const visitsWithGPS = allVisits.filter(v => v.gps && v.gps.includes(','));
    if (visitsWithGPS.length === 0) {
      mapEl.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:14px;background:#1E293B">📍 Nessuna visita con GPS registrata</div>';
      return;
    }
    if (!mapInstance) {
      mapInstance = L.map('visitsMap');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(mapInstance);
    } else {
      mapInstance.eachLayer(l => { if (l instanceof L.Marker) mapInstance.removeLayer(l); });
    }
    const colors = { positive:'#22c55e', followup:'#f59e0b', negative:'#ef4444' };
    const bounds = [];
    visitsWithGPS.forEach(v => {
      const [lat, lng] = v.gps.split(',').map(Number);
      if (isNaN(lat) || isNaN(lng)) return;
      bounds.push([lat, lng]);
      const icon = L.divIcon({
        html: `<div style="width:12px;height:12px;border-radius:50%;background:${colors[v.result]||'#6b7280'};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
        className: '', iconSize: [12, 12]
      });
      L.marker([lat, lng], {icon}).addTo(mapInstance)
        .bindPopup(`<b>${v.contact||'—'}</b><br>${v.agentName||''}<br>${v.outcome||''}`);
    });
    if (bounds.length) mapInstance.fitBounds(bounds, {padding:[20,20], maxZoom:14});
  }
};

// ── export CSV ────────────────────────────────────────────────────────────
// ── Notifiche ────────────────────────────────────────────────────────────
function showNotification(title, body) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border-radius:14px;padding:14px 18px;max-width:320px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideIn .3s ease;cursor:pointer';
  el.innerHTML = `<div style="font-weight:800;font-size:14px;margin-bottom:4px">${title}</div><div style="font-size:12px;opacity:.9">${body}</div>`;
  el.onclick = () => el.remove();
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 5000);
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, {body, icon: '/favicon.ico'});
  }
}

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

window.deleteVisit = async (key) => {
  if (!confirm('Eliminare questa visita? Azione irreversibile.')) return;
  await remove(ref(db, `visits/${key}`));
};

window.exportCSV = () => {
  const rows = (window._filteredVisits || allVisits).map(v => ({
    'Data':      fmtDate(v.timestamp),
    'Agente':    v.agentName||'',
    'Contatto':  v.contact||'',
    'Indirizzo': v.address||'',
    'Email':     v.email||'',
    'Telefono':  v.phone||'',
    'GPS':       v.gps||'',
    'Esito':     v.outcome||'',
    'Risultato': v.result||'',
  }));
  if (!rows.length) { alert('Nessuna visita da esportare'); return; }
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(';'), ...rows.map(r=>headers.map(h=>`"${(r[h]||'').replace(/"/g,'""')}"`).join(';'))].join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`visite_${new Date().toISOString().slice(0,10)}.csv`; a.click();
};

// ── tab switching ─────────────────────────────────────────────────────────
window.showTab = (name) => {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(el => {
    el.style.background='transparent'; el.style.border='1px solid transparent'; el.style.color='#9ca3af';
  });
  const tc = document.getElementById('tab-'+name);
  tc.classList.remove('hidden'); tc.classList.add('fade');
  const btn = document.querySelector(`[data-tab="${name}"]`);
  btn.style.background='#2563EB20'; btn.style.border='1px solid #2563EB55'; btn.style.color='#60A5FA';
  if (name === 'stats') {
    renderStats();
    setTimeout(() => { if (mapInstance) mapInstance.invalidateSize(); }, 300);
  }
};

// ── utils ─────────────────────────────────────────────────────────────────
function fmtDate(ts) {
  return new Date(ts).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function badge(r) {
  const map={positive:['#22c55e','✓ Positivo'],followup:['#f59e0b','↻ Follow-up'],negative:['#ef4444','✗ Negativo']};
  const [col,lab]=map[r]||['#6b7280','—'];
  return `<span style="background:${col};color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">${lab}</span>`;
}
function field(label, val) {
  return `<div style="background:#0F172A;border-radius:10px;padding:10px 14px"><div style="font-size:11px;color:#6b7280;margin-bottom:3px">${label}</div><div style="font-size:14px;font-weight:600">${esc(val||'—')}</div></div>`;
}
</script>

<script>
// Inline manifest
const manifestData = {"name": "FieldTrack", "short_name": "FieldTrack", "description": "Traccia le visite dei tuoi agenti commerciali", "start_url": "/", "display": "standalone", "background_color": "#0F172A", "theme_color": "#2563EB", "orientation": "portrait", "icons": [{"src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23dc2626'/><text y='130' x='96' text-anchor='middle' font-size='120'>\u26a1</text></svg>", "sizes": "192x192", "type": "image/svg+xml", "purpose": "any maskable"}, {"src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%23dc2626'/><text y='360' x='256' text-anchor='middle' font-size='320'>\u26a1</text></svg>", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable"}]};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const manifestURL = URL.createObjectURL(blob);
document.querySelector('link[rel="manifest"]')?.setAttribute('href', manifestURL);

// Inline service worker
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([`
const CACHE = 'fieldtrack-v1';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { self.clients.claim(); });
self.addEventListener('fetch', e => {
  if (e.request.url.includes('firebase') || e.request.url.includes('anthropic') || e.request.url.includes('googleapis')) return;
  e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
});
`], {type:'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, {scope:'/'}).catch(e => console.log('SW:', e));
}
